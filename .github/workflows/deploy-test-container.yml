# test-container サンプル API を ACR へ build & push するワークフロー。
#
# サービスプリンシパル(SP)は不要。ACR の admin 認証情報のみを使用する。
#
# 必要な GitHAub Secret（Settings > Secrets and variables > Actions）:
#   ACR_LOGIN_SERVER ... 例: pbwscobolacr3nt77.azurecr.io
#   ACR_USERNAME     ... ACR admin ユーザー名（= レジストリ名）
#   ACR_PASSWORD     ... ACR admin パスワード
#
# デプロイ（Container App の更新）は ARM 権限が必要なため、このワークフローには含めない。
# push 後に Contributor 権限を持つ環境から以下を実行してデプロイする:
#   az containerapp update -n pbwscobol-api -g pbwscobol-rg \
#     --image <ACR_LOGIN_SERVER>/sample-accounts:<tag>
name: Build & push test-container

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/test-container/**"
      - ".github/workflows/deploy-test-container.yml"
  workflow_dispatch:

env:
  IMAGE_REPO: sample-accounts

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: infra/terraform/test-container
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPO }}:latest
