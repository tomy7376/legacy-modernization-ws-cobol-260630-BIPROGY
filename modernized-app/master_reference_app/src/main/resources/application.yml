spring:
  application:
    name: master-reference-app
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/banking}
    username: ${DB_USER:cobol}
    password: ${DB_PASSWORD:cobol}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
